{% extends "base.html" %}
{% block title %}News – World of Shadows{% endblock %}

{% block content %}
<div id="news-detail" class="news-detail" data-news-id="{{ news_id }}" data-api-url="{{ backend_api_url }}">
    <p class="loading" id="news-detail-loading">Loading…</p>
    <article id="news-detail-content" class="news-detail-content" hidden></article>
    <p id="news-detail-error" class="error" hidden></p>
</div>
<p class="back-link"><a href="{{ url_for('news_list') }}">← Back to News</a></p>
{% endblock %}

{% block extra_scripts %}
<script src="{{ url_for('static', filename='news.js') }}"></script>
<script>
(function() {
    if (window.NewsApp && window.NewsApp.loadDetail) {
        var el = document.getElementById('news-detail');
        var id = el && el.getAttribute('data-news-id');
        if (id) window.NewsApp.loadDetail(parseInt(id, 10));
    }
})();
</script>
{% endblock %}

# World of Shadows – backend + administration-tool split
# backend: API, auth, dashboard, DB (Flask + Gunicorn). administration-tool: public site, news (Flask).
# From repo root: docker compose up --build
# Then: backend http://localhost:8000, administration-tool http://localhost:5001
# Browser uses BACKEND_API_URL (frontend env) to call the API; set so the browser can reach backend (e.g. http://localhost:8000).

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./backend/instance:/app/instance
    environment:
      - FLASK_APP=run:app
      - CORS_ORIGINS=http://localhost:5001,http://127.0.0.1:5001

  frontend:
    build:
      context: ./administration-tool
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    environment:
      - BACKEND_API_URL=http://localhost:8000
      - PORT=5001
    # Frontend has no DB; it calls backend from the browser, so BACKEND_API_URL must be the URL the browser uses (localhost:8000 when using compose ports).
